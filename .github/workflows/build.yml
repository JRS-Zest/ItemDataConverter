name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  windows-build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore ItemDataConverter.sln

      - name: Build (Release)
        shell: pwsh
        run: |
          dotnet build ItemDataConverter.sln -c Release --no-restore

      - name: Publish single-file (win-x64)
        shell: pwsh
        run: |
          dotnet publish ItemDataConverter.csproj -c Release -r win-x64 --self-contained false -o artifact/publish_single

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ItemDataConverter-Release
          path: artifact/publish_single/**
          if-no-files-found: error
