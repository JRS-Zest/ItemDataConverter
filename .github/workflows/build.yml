name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  windows-build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          lfs: false
          submodules: false
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Prepare RedStoneLib runtime DLL
        shell: pwsh
        run: |
          Expand-Archive -Path lib/RedStoneLib.runtime.zip -DestinationPath lib/runtime -Force
          Copy-Item lib/runtime/RedStoneLib.dll lib/RedStoneLib.dll -Force

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore ItemDataConverter.sln

      - name: Build (Release)
        shell: pwsh
        run: |
          dotnet build ItemDataConverter.sln -c Release --no-restore

      - name: Publish single-file (win-x64)
        shell: pwsh
        run: |
          dotnet publish ItemDataConverter.csproj -c Release -r win-x64 --self-contained false -o artifact/publish_single
          Copy-Item lib/RedStoneLib.dll artifact/publish_single/RedStoneLib.dll -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ItemDataConverter-Release
          path: artifact/publish_single/**
          if-no-files-found: error
